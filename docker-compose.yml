version: '3.8'

services:
  # --- Track 2: FastAPI Application (The Inference Engine) ---
  fastapi_app:
    image: python:3.12-slim
    container_name: fastapi_server
    working_dir: /app
    volumes:
      - .:/app
    # Note: Installing all dependencies including mlflow and scikit-learn
    command: >
      bash -c "pip install --upgrade pip && 
      pip install fastapi uvicorn prometheus-fastapi-instrumentator pydantic mlflow scikit-learn pandas && 
      uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    restart: always

  # --- Metrics Collection: Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_monitor
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: always

  # --- Visualization: Grafana Dashboard ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: always